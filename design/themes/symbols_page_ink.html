<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RimeConfig · 符号表（水墨）</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1180px;height:760px;font-family:"Microsoft YaHei","PingFang SC",sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:#ECE4D6;overflow:hidden;}
  .window{width:1180px;height:760px;background:#F5F1E8;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 0 1px #D8CDB8;}
  .titlebar{height:44px;flex:0 0 44px;background:#EDE5D4;border-bottom:1px solid #D8CDB8;display:flex;align-items:center;padding:0 8px 0 14px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .seal{width:24px;height:24px;border-radius:5px;background:#B23A2E;color:#F5F1E8;display:flex;align-items:center;justify-content:center;font-family:"Source Han Serif SC","Noto Serif SC","SimSun",serif;font-size:14px;font-weight:700;}
  .title{font-family:"Source Han Serif SC","Noto Serif SC","SimSun",serif;font-size:15px;font-weight:700;color:#2B2620;letter-spacing:1px;}
  .ver{font-size:11px;color:#A08E72;margin-left:2px;}
  .wc{margin-left:auto;display:flex;gap:2px;}
  .wc div{width:34px;height:30px;display:flex;align-items:center;justify-content:center;color:#6B5E48;border-radius:6px;}
  .wc div:hover{background:#E0D5BE;}
  .body{flex:1;display:flex;min-height:0;}
  .sidebar{width:208px;flex:0 0 208px;background:#EBE2CF;border-right:1px solid #D8CDB8;padding:14px 10px;display:flex;flex-direction:column;gap:4px;}
  .nl{font-size:11px;color:#A1916F;letter-spacing:.6px;padding:6px 10px 4px;}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:7px;color:#5A4E3A;font-size:13.5px;cursor:default;}
  .nav svg{width:17px;height:17px;opacity:.8;}
  .nav:hover{background:#E2D8C2;}
  .nav.active{background:#2F5D50;color:#F3EFE4;font-weight:600;}
  .content{flex:1;display:flex;flex-direction:column;min-width:0;background:#F5F1E8;position:relative;}
  .content::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#B23A2E,#2F5D50);}
  .page-head{padding:18px 26px 12px;display:flex;align-items:flex-end;gap:12px;}
  .ph-title{font-family:"Source Han Serif SC","Noto Serif SC","SimSun",serif;font-size:22px;font-weight:700;color:#2B2620;letter-spacing:1px;}
  .ph-sub{font-size:12px;color:#9A8A6C;}
  .pill{margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:#E3EFE8;color:#2F5D50;border:1px solid #BFD9CC;font-size:11.5px;padding:4px 10px;border-radius:20px;}
  .toolbar{display:flex;align-items:center;gap:10px;padding:4px 26px 12px;}
  .search{position:relative;flex:1;max-width:340px;}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#A1916F;}
  .search input{width:100%;height:36px;border:1px solid #CDBE9F;background:#FBF8F0;border-radius:8px;padding:0 12px 0 34px;font-size:13px;color:#2B2620;outline:none;}
  .btn{height:36px;padding:0 15px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:default;border:1px solid transparent;}
  .btn-primary{background:#2F5D50;color:#F3EFE4;}
  .btn-primary:hover{background:#264C41;}
  .btn-ghost{background:#FBF8F0;color:#5A4E3A;border-color:#CDBE9F;}
  .btn-ghost:hover{background:#EFE7D6;}
  .select{height:36px;padding:0 30px 0 12px;border:1px solid #CDBE9F;background:#FBF8F0;border-radius:8px;font-size:12.5px;color:#5A4E3A;display:inline-flex;align-items:center;cursor:default;position:relative;}
  .select::after{content:"";position:absolute;right:11px;top:50%;width:7px;height:7px;border-right:1.5px solid #8A7A5C;border-bottom:1.5px solid #8A7A5C;transform:translateY(-65%) rotate(45deg);}

  .split{flex:1;display:flex;min-height:0;margin:0 26px;gap:14px;}
  .cat{width:212px;flex:0 0 212px;background:#FBF8F0;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
  .cat-head{padding:12px 14px;font-size:12px;font-weight:600;color:#8A7A5C;border-bottom:1px solid #DDD2BB;background:#F0E9D8;}
  .cat-list{flex:1;overflow:auto;padding:6px;}
  .cat-item{display:flex;align-items:center;padding:9px 11px;border-radius:7px;color:#5A4E3A;font-size:13px;cursor:default;}
  .cat-item:hover{background:#F1E8D6;}
  .cat-item.active{background:#2F5D50;color:#F3EFE4;font-weight:600;}
  .cat-item .cnt{margin-left:auto;font-size:11px;color:#A1916F;background:#EBE2CF;border-radius:10px;padding:1px 8px;}
  .cat-item.active .cnt{background:#3E6E60;color:#E3EFE8;}
  .cat-add{margin:8px;padding:8px;border:1px dashed #C2B08C;border-radius:8px;text-align:center;color:#2F5D50;font-size:12.5px;cursor:default;}

  .table-wrap{flex:1;background:#FBF8F0;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-weight:600;color:#8A7A5C;font-size:12px;padding:11px 16px;background:#F0E9D8;border-bottom:1px solid #DDD2BB;}
  tbody td{padding:11px 16px;border-bottom:1px solid #EAE0CB;color:#3A3228;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#F4EEDD;}
  .sym{display:inline-flex;gap:5px;}
  .sym span{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0 6px;background:#F3EFE4;border:1px solid #E2DAC6;border-radius:6px;font-size:15px;color:#2B2620;}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;background:#E3EFE8;color:#2F5D50;}
  .ops{display:flex;gap:8px;}
  .op{color:#8A7A5C;cursor:default;font-size:12.5px;display:inline-flex;align-items:center;gap:4px;}
  .op:hover{color:#2F5D50;}
  .op.del:hover{color:#B23A2E;}
  .op svg{width:14px;height:14px;}
  .statusbar{height:34px;flex:0 0 34px;display:flex;align-items:center;gap:16px;padding:0 28px;font-size:11.5px;color:#9A8A6C;border-top:1px solid #D8CDB8;background:#EDE5D4;}
  .statusbar .save{margin-left:auto;display:inline-flex;align-items:center;gap:6px;color:#B23A2E;}
  .dot{width:7px;height:7px;border-radius:50%;background:#3F7A5E;}
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="brand"><div class="seal">輸</div><span class="title">RIME 配置小工具</span><span class="ver">v0.2.0</span></div>
    <div class="wc"><div>—</div><div>×</div></div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="nl">管理</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h10"/></svg>词库管理</div>
      <div class="nav active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><path d="M11 8h6M8 11v6"/></svg>符号表</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M9 9v11"/></svg>方案配置</div>
      <div class="nl">系统</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>设置</div>
    </div>
    <div class="content">
      <div class="page-head"><div><div class="ph-title">符号表</div><div class="ph-sub">symbols_v.yaml · 共 86 条</div></div><span class="pill"><span class="dot"></span>已连接 · 自动部署开</span></div>
      <div class="toolbar">
        <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><input placeholder="搜索键位、符号或分类…"></div>
        <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增符号</button>
        <div class="select">分类：全部</div>
      </div>
      <div class="split">
        <div class="cat">
          <div class="cat-head">分类</div>
          <div class="cat-list">
            <div class="cat-item active">全部 <span class="cnt">86</span></div>
            <div class="cat-item">常用 <span class="cnt">18</span></div>
            <div class="cat-item">标点 <span class="cnt">12</span></div>
            <div class="cat-item">数学 <span class="cnt">15</span></div>
            <div class="cat-item">希腊字母 <span class="cnt">14</span></div>
            <div class="cat-item">箭头 <span class="cnt">11</span></div>
            <div class="cat-item">单位 <span class="cnt">9</span></div>
            <div class="cat-add">+ 新建分类</div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>键位</th><th>符号</th><th>分类</th><th>操作</th></tr></thead>
            <tbody>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">dq</td><td><div class="sym"><span>°</span></div></td><td><span class="tag">数学</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">sj</td><td><div class="sym"><span>±</span><span>×</span><span>÷</span></div></td><td><span class="tag">数学</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">gx</td><td><div class="sym"><span>α</span><span>β</span><span>γ</span></div></td><td><span class="tag">希腊字母</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">jt</td><td><div class="sym"><span>→</span><span>←</span><span>↑</span><span>↓</span></div></td><td><span class="tag">箭头</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">bd</td><td><div class="sym"><span>①</span><span>②</span><span>③</span></div></td><td><span class="tag">常用</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
              <tr><td class="code" style="font-family:'Cascadia Code',Consolas,monospace;color:#7A6E52">sh</td><td><div class="sym"><span>·</span><span>…</span><span>—</span></div></td><td><span class="tag">标点</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="statusbar"><span>共 86 条</span><span>分类 7 个</span><span class="save"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>● 有未保存的修改</span></div>
    </div>
  </div>
</div>
</body>
</html>
