<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RimeConfig · 批量选择态</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1180px;height:760px;font-family:"Segoe UI","Microsoft YaHei UI","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:#F3F3F3;overflow:hidden;}
  .window{width:1180px;height:760px;background:#F3F3F3;display:flex;flex-direction:column;overflow:hidden;}
  .titlebar{height:44px;flex:0 0 44px;background:#FAFAFA;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;padding:0 8px 0 14px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .logo{width:22px;height:22px;border-radius:6px;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .title{font-size:13px;font-weight:600;color:#1B1B1B;}
  .ver{font-size:11px;color:#8A8A8A;margin-left:2px;}
  .wc{margin-left:auto;display:flex;gap:2px;}
  .wc div{width:34px;height:30px;display:flex;align-items:center;justify-content:center;color:#3B3B3B;border-radius:6px;}
  .wc div:hover{background:#ECECEC;}
  .body{flex:1;display:flex;min-height:0;}
  .sidebar{width:208px;flex:0 0 208px;background:#FAFAFA;border-right:1px solid #E5E5E5;padding:14px 10px;display:flex;flex-direction:column;gap:4px;}
  .nl{font-size:11px;color:#9A9A9A;letter-spacing:.6px;padding:6px 10px 4px;}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:7px;color:#33373A;font-size:13.5px;cursor:default;}
  .nav svg{width:17px;height:17px;opacity:.85;}
  .nav:hover{background:#EDEDED;}
  .nav.active{background:#E6F0F9;color:#185FA5;font-weight:600;}
  .content{flex:1;display:flex;flex-direction:column;min-width:0;background:#F3F3F3;}
  .page-head{padding:18px 22px 12px;display:flex;align-items:flex-end;gap:12px;}
  .ph-title{font-size:20px;font-weight:600;color:#1B1B1B;}
  .ph-sub{font-size:12px;color:#8A8A8A;}
  .pill{margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:#EAF4EE;color:#1E7E45;border:1px solid #CDEBD6;font-size:11.5px;padding:4px 10px;border-radius:20px;}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:#2E9E5B;}
  .toolbar{display:flex;align-items:center;gap:10px;padding:4px 22px 14px;}
  .search{position:relative;flex:1;max-width:340px;}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9AA0A6;}
  .search input{width:100%;height:36px;border:1px solid #D8D8D8;background:#fff;border-radius:8px;padding:0 12px 0 34px;font-size:13px;color:#1B1B1B;outline:none;}
  .btn{height:36px;padding:0 15px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:default;border:1px solid transparent;}
  .btn-primary{background:#185FA5;color:#fff;}
  .btn-primary:hover{background:#14507F;}
  .btn-ghost{background:#fff;color:#33373A;border-color:#D8D8D8;}
  .btn-ghost:hover{background:#F3F3F3;}
  .btn svg{width:15px;height:15px;}

  .batchbar{margin:0 22px;background:#E6F0F9;border:1px solid #C7DCF1;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:12px;padding:10px 16px;font-size:13px;color:#185FA5;font-weight:600;}
  .batchbar .count{background:#185FA5;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;}
  .batchbar .acts{margin-left:auto;display:flex;gap:8px;font-weight:500;}
  .bact{height:32px;padding:0 13px;border-radius:7px;font-size:12.5px;display:inline-flex;align-items:center;gap:5px;cursor:default;border:1px solid transparent;}
  .bact.danger{background:#fff;color:#C42B1C;border-color:#F0C4BE;}
  .bact.danger:hover{background:#FDECEA;}
  .bact.export{background:#fff;color:#185FA5;border-color:#C7DCF1;}
  .bact.export:hover{background:#DBE9F7;}
  .bact.clear{background:transparent;color:#5A6066;}
  .bact svg{width:14px;height:14px;}

  .table-wrap{margin:0 22px;background:#fff;border:1px solid #E5E5E5;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-weight:600;color:#6B7075;font-size:12px;padding:11px 16px;background:#FBFBFB;border-bottom:1px solid #ECECEC;}
  tbody td{padding:11px 16px;border-bottom:1px solid #F1F1F1;color:#2B2B2B;}
  tbody tr:hover{background:#FAFBFC;}
  tbody tr.sel{background:#EFF5FB;}
  .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid #C2C8CE;background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:default;vertical-align:middle;}
  .chk.on{background:#185FA5;border-color:#185FA5;}
  .chk.on svg{color:#fff;}
  .code{font-family:"Cascadia Code","Consolas",monospace;color:#5A6066;font-size:12.5px;}
  .weight{display:inline-block;min-width:30px;text-align:center;background:#EFF1F3;color:#444;border-radius:5px;padding:2px 7px;font-size:12px;font-weight:600;}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;background:#EAF0F6;color:#2E5E8C;}
  .ops{display:flex;gap:8px;}
  .op{color:#5A6066;cursor:default;font-size:12.5px;display:inline-flex;align-items:center;gap:4px;}
  .op:hover{color:#185FA5;}
  .op.del:hover{color:#C42B1C;}
  .op svg{width:14px;height:14px;}
  .statusbar{height:34px;flex:0 0 34px;display:flex;align-items:center;gap:16px;padding:0 24px;font-size:11.5px;color:#7A7F85;border-top:1px solid #E5E5E5;background:#FAFAFA;}
  .statusbar .save{margin-left:auto;color:#9A9A9A;}
</style>
</head>
<body>
<div class="window">
  <div class="titlebar"><div class="brand"><div class="logo">R</div><span class="title">RIME 配置小工具</span><span class="ver">v0.2.0</span></div><div class="wc"><div>—</div><div>×</div></div></div>
  <div class="body">
    <div class="sidebar">
      <div class="nl">管理</div>
      <div class="nav active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h10"/></svg>词库管理</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><path d="M11 8h6M8 11v6"/></svg>符号表</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M9 9v11"/></svg>方案配置</div>
      <div class="nl">系统</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>设置</div>
    </div>
    <div class="content">
      <div class="page-head"><div><div class="ph-title">词库管理</div><div class="ph-sub">custom_phrase.txt · 共 1,248 条</div></div><span class="pill"><span class="dot"></span>已连接 · 自动部署开</span></div>
      <div class="toolbar">
        <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><input placeholder="搜索汉字、拼音或分组…"></div>
        <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增</button>
        <div class="select" style="border-color:#C7DCF1;color:#185FA5;">全选 ✓</div>
        <div class="select">排序：权重</div>
      </div>
      <div class="batchbar">
        <span class="count">已选 5 项</span>
        <span style="font-weight:500;color:#5A6066;">可对选中词条批量操作</span>
        <span class="acts">
          <span class="bact danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>批量删除</span>
          <span class="bact export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 4v10M8 11l4 4 4-4M5 19h14"/></svg>导出 CSV</span>
          <span class="bact clear">取消选择</span>
        </span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th style="width:40px;"></th><th>汉字</th><th>拼音</th><th>权重</th><th>分组</th><th>操作</th></tr></thead>
          <tbody>
            <tr class="sel"><td><span class="chk on"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg></span></td><td>银行</td><td class="code">yinhang</td><td><span class="weight">100</span></td><td><span class="tag">工作</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr class="sel"><td><span class="chk on"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg></span></td><td>长江</td><td class="code">changjiang</td><td><span class="weight">60</span></td><td><span class="tag">地名</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr class="sel"><td><span class="chk on"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg></span></td><td>微信</td><td class="code">weixin</td><td><span class="weight">70</span></td><td><span class="tag">工作</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr class="sel"><td><span class="chk on"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg></span></td><td>谢谢</td><td class="code">xiexie</td><td><span class="weight">30</span></td><td><span class="tag">生活</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr class="sel"><td><span class="chk on"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg></span></td><td>你好</td><td class="code">nihao</td><td><span class="weight">50</span></td><td><span class="tag">生活</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr><td><span class="chk"></span></td><td>武汉</td><td class="code">wh</td><td><span class="weight">80</span></td><td><span class="tag">地名</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
            <tr><td><span class="chk"></span></td><td>午后</td><td class="code">wh</td><td><span class="weight">40</span></td><td><span class="tag">时间</span></td><td><div class="ops"><span class="op"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>编辑</span><span class="op del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>删除</span></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="statusbar"><span>共 1,248 条</span><span>已选 5 条</span><span>冲突 3 条</span><span class="save">已保存</span></div>
    </div>
  </div>
</div>
</body>
</html>
