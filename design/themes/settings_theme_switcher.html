<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RimeConfig · 设置页主题切换</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1180px;height:760px;font-family:"Segoe UI","Microsoft YaHei UI","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:#F3F3F3;overflow:hidden;}
  .window{width:1180px;height:760px;background:#F3F3F3;display:flex;flex-direction:column;overflow:hidden;}

  .titlebar{height:44px;flex:0 0 44px;background:#FAFAFA;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;padding:0 8px 0 14px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .logo{width:22px;height:22px;border-radius:6px;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .title{font-size:13px;font-weight:600;color:#1B1B1B;}
  .ver{font-size:11px;color:#8A8A8A;margin-left:2px;}
  .wc{margin-left:auto;display:flex;gap:2px;}
  .wc div{width:34px;height:30px;display:flex;align-items:center;justify-content:center;color:#3B3B3B;border-radius:6px;}
  .wc div:hover{background:#ECECEC;}

  .body{flex:1;display:flex;min-height:0;}
  .sidebar{width:208px;flex:0 0 208px;background:#FAFAFA;border-right:1px solid #E5E5E5;padding:14px 10px;display:flex;flex-direction:column;gap:4px;}
  .nl{font-size:11px;color:#9A9A9A;letter-spacing:.6px;padding:6px 10px 4px;}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:7px;color:#33373A;font-size:13.5px;}
  .nav svg{width:17px;height:17px;opacity:.85;}
  .nav:hover{background:#EDEDED;}
  .nav.active{background:#E6F0F9;color:#185FA5;font-weight:600;}

  .content{flex:1;display:flex;flex-direction:column;background:#F3F3F3;overflow:auto;}
  .ph{padding:18px 26px 8px;}
  .ph h1{font-size:20px;font-weight:600;color:#1B1B1B;}
  .ph p{font-size:12px;color:#8A8A8A;margin-top:2px;}

  .section{margin:14px 26px;background:#fff;border:1px solid #E5E5E5;border-radius:10px;overflow:hidden;}
  .sec-title{font-size:12px;font-weight:600;color:#6B7075;padding:12px 16px;background:#FBFBFB;border-bottom:1px solid #ECECEC;letter-spacing:.3px;}
  .row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #F1F1F1;font-size:13px;color:#2B2B2B;}
  .row:last-child{border-bottom:none;}
  .row .lb{color:#5A6066;}
  .row .val{margin-left:auto;color:#8A8A8A;font-size:12.5px;display:flex;align-items:center;gap:8px;}
  .switch{width:38px;height:22px;border-radius:20px;background:#185FA5;position:relative;}
  .switch::after{content:"";position:absolute;right:2px;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;}
  .switch.off{background:#D0D0D0;}
  .switch.off::after{right:auto;left:2px;}

  /* 主题卡片组 */
  .theme-row{padding:16px;display:flex;gap:14px;flex-wrap:wrap;}
  .tcard{width:200px;border:2px solid #E5E5E5;border-radius:12px;padding:10px;cursor:default;background:#fff;position:relative;transition:border-color .15s;}
  .tcard:hover{border-color:#B9C7D6;}
  .tcard.sel{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.12);}
  .tcard .check{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;background:#185FA5;color:#fff;display:none;align-items:center;justify-content:center;font-size:13px;}
  .tcard.sel .check{display:flex;}
  .thumb{height:96px;border-radius:8px;overflow:hidden;display:flex;border:1px solid #E5E5E5;}
  .thumb .sb{width:34px;flex:0 0 34px;}
  .thumb .ct{flex:1;padding:8px;display:flex;flex-direction:column;gap:5px;}
  .thumb .bar{height:8px;border-radius:3px;}
  .thumb .pill{height:14px;width:60%;border-radius:7px;}
  .thumb .row2{height:8px;border-radius:3px;opacity:.6;}
  .thumb .row3{height:8px;border-radius:3px;width:80%;opacity:.4;}
  .tcard .name{margin-top:9px;font-size:13.5px;font-weight:600;color:#1B1B1B;display:flex;align-items:center;gap:7px;}
  .tcard .desc{font-size:11px;color:#8A8A8A;margin-top:2px;}

  .hint{padding:0 26px 20px;font-size:11.5px;color:#9AA0A6;}
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="brand"><div class="logo">R</div><span class="title">RIME 配置小工具</span><span class="ver">v0.2.0</span></div>
    <div class="wc"><div>—</div><div>×</div></div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="nl">管理</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h10"/></svg>词库管理</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><path d="M11 8h6M8 11v6"/></svg>符号表</div>
      <div class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M9 9v11"/></svg>方案配置</div>
      <div class="nl">系统</div>
      <div class="nav active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>设置</div>
    </div>
    <div class="content">
      <div class="ph"><h1>设置</h1><p>修改即时生效，并自动记忆</p></div>

      <div class="section">
        <div class="sec-title">常规</div>
        <div class="row"><span class="lb">Rime 目录</span><span class="val">C:\Users\…\AppData\Roaming\Rime <span style="color:#185FA5">浏览</span></span></div>
        <div class="row"><span class="lb">开机自启</span><span class="val"><span class="switch"></span></span></div>
        <div class="row"><span class="lb">全局热键收藏</span><span class="val">Ctrl+Alt+Q <span class="switch"></span></span></div>
        <div class="row"><span class="lb">写后自动部署</span><span class="val"><span class="switch"></span></span></div>
        <div class="row"><span class="lb">备份保留份数</span><span class="val">5 份</span></div>
      </div>

      <div class="section">
        <div class="sec-title">外观 · 主题（选中即实时预览）</div>
        <div class="theme-row">
          <!-- A 浅色 -->
          <div class="tcard sel">
            <div class="check">✓</div>
            <div class="thumb">
              <div class="sb" style="background:#FAFAFA;border-right:1px solid #E5E5E5;"></div>
              <div class="ct" style="background:#FFFFFF;">
                <div class="bar" style="background:#E6F0F9;width:70%"></div>
                <div class="pill" style="background:#185FA5"></div>
                <div class="row2" style="background:#1B1B1B"></div>
                <div class="row3" style="background:#5A6066"></div>
              </div>
            </div>
            <div class="name">浅色 · Fluent</div>
            <div class="desc">类 Windows 11，品牌蓝 #185FA5</div>
          </div>
          <!-- B 深色 -->
          <div class="tcard">
            <div class="check">✓</div>
            <div class="thumb">
              <div class="sb" style="background:#1E1E1E;border-right:1px solid #2E2E2E;"></div>
              <div class="ct" style="background:#202020;">
                <div class="bar" style="background:#243245;width:70%"></div>
                <div class="pill" style="background:#4A9EFF"></div>
                <div class="row2" style="background:#ECECEC"></div>
                <div class="row3" style="background:#9AA0A6"></div>
              </div>
            </div>
            <div class="name">深色 · Pro</div>
            <div class="desc">炭灰深色，亮蓝 #4A9EFF</div>
          </div>
          <!-- C 水墨 -->
          <div class="tcard">
            <div class="check">✓</div>
            <div class="thumb">
              <div class="sb" style="background:linear-gradient(180deg,#B23A2E,#2F5D50);width:6px;flex:0 0 6px;"></div>
              <div class="ct" style="background:#FBF8F0;">
                <div class="bar" style="background:#2F5D50;width:70%"></div>
                <div class="pill" style="background:#2F5D50"></div>
                <div class="row2" style="background:#2B2620"></div>
                <div class="row3" style="background:#7A6E52"></div>
              </div>
            </div>
            <div class="name">水墨 · Scholar</div>
            <div class="desc">暖纸宋体 + 朱砂印章</div>
          </div>
        </div>
      </div>
      <div class="hint">提示：切换主题仅重设样式，不重建窗口、不丢失表单内容、不触发部署。</div>
    </div>
  </div>
</div>
</body>
</html>
