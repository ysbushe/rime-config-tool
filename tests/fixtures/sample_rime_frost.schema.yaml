schema:
  schema_id: rime_frost
  name: 白霜拼音
  version: "2024-02-25"
switches:
  - name: ascii_mode
    states: [ 中, Ａ ]
  - name: ascii_punct
    states: [ ¥, $ ]
  - name: traditionalization
    states: [ 简, 繁 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: search_single_char
    abbrev: [词, 单]
    states: [正常, 单字]
engine:
  translators:
    - punct_translator
    - script_translator
    - table_translator@custom_phrase
    - table_translator@melt_eng
    - table_translator@cn_en
key_binder:
  import_preset: default
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99
